<!doctype html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TrackMaster | Login</title>
        <link rel="icon" type="image/svg+xml"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230d6efd'/%3E%3Cpath d='M16 22l16-8 16 8-16 8-16-8zm0 8l16 8 16-8v12L32 50 16 42V30z' fill='white'/%3E%3C/svg%3E" />
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="./css/style.css" />
    </head>

    <body class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <i class="bi bi-box-seam"></i>
                <h2>TrackMaster</h2>
                <p>Sign in to manage products, suppliers, and stock.</p>
            </div>

            <div id="loginError" class="alert alert-danger d-none"
                role="alert"></div>

            <form id="loginForm" class="d-grid gap-3">
                <div>
                    <label for="loginEmail" class="form-label">Email
                        address</label>
                    <input
                        type="email"
                        id="loginEmail"
                        class="form-control"
                        placeholder="admin@trackmaster.com"
                        required />
                </div>

                <div>
                    <label for="loginPassword"
                        class="form-label">Password</label>
                    <input
                        type="password"
                        id="loginPassword"
                        class="form-control"
                        placeholder="Enter your password"
                        required />
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">Sign
                    In</button>
            </form>

            <div class="alert alert-light border mt-4 mb-0">
                <strong>Demo accounts</strong>
                <div class="small mt-2 d-grid gap-1">
                    <span><code>admin@trackmaster.com</code> /
                        <code>admin123</code></span>
                    <span><code>abdulrahman@trackmaster.com</code> /
                        <code>abdulrahman123</code></span>
                </div>
                <div class="small text-muted mt-2">Run <code>npm run
                        server</code> to enable login.</div>
            </div>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="./js/pages/login.js" type="module"></script>
    </body>

</html>
