<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackMaster</title>
    <link rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230d6efd'/%3E%3Cpath d='M16 22l16-8 16 8-16 8-16-8zm0 8l16 8 16-8v12L32 50 16 42V30z' fill='white'/%3E%3C/svg%3E" />
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="./css/style.css">
  </head>

  <body class="d-flex">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="bi bi-box-seam sidebar-logo-icon"></i>
        <div class="sidebar-logo-text">
          <h1>TrackMaster</h1>
          <small>Inventory Manager</small>
        </div>
      </div>

      <div class="user-info">
        <i class="bi bi-person-circle"></i>
        <div>
          <span id="userName">Guest User</span>
          <small id="userRole">Not signed in</small>
        </div>
        <i id="logoutBtn" class="bi bi-box-arrow-right logout-btn" role="button"
          aria-label="Logout" title="Logout"></i>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <div class="nav-item active-content" data-page="Dashboard">
          <i class="bi bi-speedometer2"></i><span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="Products">
          <i class="bi bi-box"></i><span>Products</span>
        </div>
        <div class="nav-section">Management</div>
        <div class="nav-item" data-page="Categories">
          <i class="bi bi-tags"></i><span>Categories</span>
        </div>
        <div class="nav-item" data-page="Suppliers">
          <i class="bi bi-truck"></i><span>Suppliers</span>
        </div>
        <div class="nav-item" data-page="Purchase Orders">
          <i class="bi bi-cart-check"></i><span>Purchase Orders</span>
        </div>
        <div class="nav-section">Operations</div>
        <div class="nav-item" data-page="Stock Adjustments">
          <i class="bi bi-sliders"></i><span>Stock Adjustments</span>
        </div>
        <div class="nav-item" data-page="Reports">
          <i class="bi bi-bar-chart-line"></i><span>Reports</span>
        </div>
        <div class="nav-item" data-page="Activity Log">
          <i class="bi bi-journal-text"></i><span>Activity Log</span>
        </div>
      </nav>
    </aside>

    <main class="flex-grow-1">
      <div class="container-fluid contentContainer mb-3">
        <header class="row bg-white p-3 border-bottom border-light shadow-sm">
          <h2 class="fs-4 pageTitle" id="pageTitle">Dashboard</h2>
        </header>
        <div id="pageContent" class="mt-3">
          <!-- المحتوى هيتحط هنا -->
        </div>
      </div>
      <footer class="mt-auto py-3 px-4 border-top bg-white ">
        <div class="d-flex justify-content-between align-items-center">
          <small class="text-muted">© 2026 TrackMaster. All rights
            reserved.</small>
          <small class="text-muted">Inventory Management System v1.0</small>
        </div>
      </footer>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js" type="module"></script>
  </body>

</html>
