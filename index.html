<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body class="d-flex">
    <div
      class="sidebar d-flex flex-column p-3 vh-100 bg-dark text-white overflow-y-auto"
      style="width: 250px">
      <p class="fw-bold fs-3"><i
          class="bi bi-box-seam me-2"></i>StockIQ</p>
      <p class="text-secondary">Inventory Manager</p>
      <hr />
      <label class="text-secondary p-1">MAIN</label>
      <a class="nav-link text-white p-2 rounded active-content" href="#">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
      </a>
      <a class="nav-link text-white p-2 rounded" href="#">
        <i class="bi bi-box-seam me-2"></i> Products
      </a>

      <label class="text-secondary p-1">MANAGEMENT</label>
      <a class="nav-link text-white p-2 rounded" href="#">
        <i class="bi bi-tag me-2"></i> Categories
      </a>
      <a class="nav-link text-white p-2 rounded" href="#">
        <i class="bi bi-truck me-2"></i> Suppliers
      </a>
      <a class="nav-link text-white p-2 rounded" href="#">
        <i class="bi bi-cart me-2"></i> Purchase Orders
      </a>
      <label class="text-secondary p-1">OPERATIONS</label>
      <a class="nav-link text-white p-2 rounded" href="#">
        <i class="bi bi-arrow-left-right me-2"></i> Stock Adjustments
      </a>
      <a class="nav-link text-white p-2 rounded" href="#">
        <i class="bi bi-bar-chart me-2"></i> Reports
      </a>
      <a class="nav-link text-white p-2 rounded" href="#">
        <i class="bi bi-clock-history me-2"></i> Activity Log
      </a>
    </div>

    <main class="flex-grow-1">
      <div class="container-fluid contentContainer">
        <header
          class="row bg-white p-3 border-bottom border-light shadow-sm">
          <h2 class="fs-4 pageTitle" id="pageTitle">Dashboard</h2>
        </header>
        <div id="pageContent" class="mt-3">
          <!-- المحتوى هيتحط هنا -->
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
